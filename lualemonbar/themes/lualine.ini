[settings]
timer =  1
modules = "date weather volume window tmp fan load spacer net mail"
cmd = "lemonbar -g 1920x16+0+0 -p -f \'Cousine for Powerline:pixelsize=14\' -f Typicons:pixelsize=16 -f \'Symbols Nerd Font Mono:pixelsize=18\' -f  \'Cousine for Powerline:style=Bold:pixelsize=14\' -B#414447 | /bin/sh"
[colors]
bgc1 =  "%{B#414447}"
bgc2 =  "%{B#444b6a}"
bgc3 =  "%{B#2e3c43}"
bgc5 =  "%{B#7aa2f7}"
fgc1 =  "%{F#b6c0e9}"
fgc2 =  "%{F#826bad}"
fgc3 =  "%{F#7aa2f7}"
sbg1 =  "%{B#1a1b26}"
sbg2 =  "%{B#414447}"
sbg3 =  "%{B#2e3c43}"
sfg1 =  "%{F#1a1b26}"
sfg2 =  "%{F#444b6a}"
sfg3 =  "%{F#2e3c43}"
bgstop =  "%{B-}"
connected =  "%{F#99c867}"
unconnect = "%{F#444b6a}"
fgstop =  "%{F-}"
unread =  "%{F#da5f8b}"
[symbols]
net =  ""
cpu =  ""
fan =  ""
mail = ""
mail_new = ""
temp = ""
vol =  ""
wthr =  ""
fidx = 3
[separators]
tar =  ""
tal =  ""
[fmt]
fl = "%{l}"
fr = "%{r}"
fc = "%{c}"
ml = "%{O20}"
mr = "%{O20}"
sp  = " "
[spacer]
width = 1
bgc = colors.bgc1
sep = separators.tal
sbg = colors.bgc1
sfg = colors.fgc3
sp = ""
fmt = fmt.fr
[net]
iv =  2
bgc =  colors.bgc5
fgc1 =  "%{F#1a1b26}"
fgc2 =  "%{F#1a1b26}"
sbg =  "%{B#1a1b26}"
sfg =  "%{F#7aa5f5}"
tx_qstr =  "/sys/class/net/eth0/statistics/tx_bytes"
st_qstr =  "nmcli -f STATE -t device status"
rx_qstr =  "/sys/class/net/eth0/statistics/rx_bytes"
sep =  ""
fmt = ""
[volume]
fgc1 =  "%{F#b6c0e9}"
sfg =  "%{F#414447}"
sbg =  colors.bgc3
v_get_str =  "pactl get-sink-volume @DEFAULT_SINK@ | cut -d ' ' -f 3"
v_set_str =  "pactl set-sink-volume @DEFAULT_SINK@ "
action = "insert button cmd"
icon =  ""
max_vol =  65536
step =  1310
iv = 1
sep = separators.tar
[weather]
iv =  3600
fgc1 =  "%{F#b6c0e9}"
fgc2 =  "%{F#826bad}"
sbg =  "%{B#1a1b26}"
sfg =  "%{F#1a1b26}"
icon =  ""
w_qstr =  "ansiweather | cut -d ':' -f 2"
action = "insert button cmd"
sep =  ""
[window]
bgc = colors.bgc3
fgc1 =  "%{F#ff9e64}"
sfg = "%{F#414447}"
sbg = colors.bgc3
w_str =  "xdotool getactivewindow getwindowname"
fmt = ""
width =66
iv = 1
sep = separators.tal
[date]
bgc =  colors.bgc5
fgc1 =  "%{F#1a1b26}"
fgc2 =  "%{F#b6c0e9}"
sfg =  colors.fgc3
sbg =  colors.bgc1
d_fmt =  "date +'%a %d:%m:%Y %H.%M'"
action = "insert button cmd"
sep = separators.tar
[load]
iv =  2
fgc1 =  "%{F#b6c0e9}"
fgc2 =  "%{F#29bdd7}"
sbg =  "%{B#1a1b26}"
sfg =  "%{F#1a1b26}"
st_qstr =  "/proc/stat"
sep =  ""
[fan]
fgc1 =  "%{F#b6c0e9}"
fgc2 =  "%{F#7aa2f7}"
sbg =  "%{B#1a1b26}"
sfg =  "%{F#1a1b26}"
iv =  10
cf_qstr =  "/sys/class/hwmon/hwmon1/fan1_input"
sf_qstr =  "/sys/class/hwmon/hwmon1/fan2_input"
sep =  ""
[tmp]
fgc1 =  "%{F#b6c0e9}"
fgc2 =  "%{F#826bad}"
sbg =  "%{B#1a1b26}"
sfg =  "%{F#1a1b26}"
iv =  10
ct_qstr =  "/sys/bus/pci/drivers/k10temp/0000:00:18.3/hwmon/hwmon0/temp1_input"
gt_qstr =  "nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits"
st_qstr =  "/sys/class/hwmon/hwmon1/temp1_input"
sep =  ""
fmt = "" 
[mail]
bgc =  colors.bgc5
fgc1 =  "%{F#1a1b26}"
fgc2 =  "%{F#da5f8b}"
sbg =  "%{B#1a1b26}"
sfg =  "%{F#1a1b26}"
nm_qstr =  "claws-mail --status | cut -d ' ' -f 2"
iv = 5
fmt = ""
sep = ""
[example]
fgc1 =  ""
sep = ""
