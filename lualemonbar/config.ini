[settings]
timer =  0.5
modules = "date weather volume spacer window tmp fan load top net mail"
cmd = "lemonbar -g 1920x16+0+0 -p -f \'Cousine for Powerline:pixelsize=14\' -f Typicons:pixelsize=16 -f \'Symbols Nerd Font Mono:pixelsize=16\' -f  \'Cousine for Powerline:style=Bold:pixelsize=14\' -B#ff1a1b26 | /bin/sh"
[colors]
bgc1 =  "%{B#1a1b26}"
bgc2 =  "%{B#414447}"
bgc3 =  "%{B#2e3c43}"
bgc4 =  "%{B#6a6f74}"
bgc5 =  "%{B#1a1b26}"
fgc1 =  "%{F#b6c0e9}"
fgc2 =  "%{F#826bad}"
fgc3 =  "%{F#7aa2f7}"
fgc4 =  "%{F#62baad}"
fgc5 =  "%{F#99c867}"
fgc6 =  "%{F#29bdd7}"
fgc7 =  "%{F#02002f}"
fgc8 =  "%{F#ff9e64}"
sbg1 =  "%{B#1a1b26}"
sbg2 =  "%{B#414447}"
sbg3 =  "%{B#2e3c43}"
sbg4 =  "%{B#6a6f74}"
sbg5 =  "%{B#1a1b26}"
sfg1 =  "%{F#1a1b26}"
sfg2 =  "%{F#414447}"
sfg3 =  "%{F#2e3c43}"
sfg4 =  "%{F#6a6f74}"
sfg5 =  "%{F#1a1b26}"
bgstop =  "%{B-}"
connected =  "%{F#99c867}"
unconnect = "%{F#444b6a}"
fgstop =  "%{F-}"
unread =  "%{F#da5f8b}"
[symbols]
net =  ""
cpu =  ""
fan =  ""
mail = ""
mail_new = ""
temp = ""
vol =  ""
wthr =  ""
fidx = 3
[separators]
tar =  ""
tal =  ""
[fmt]
fl = "%{l}"
fr = "%{r}"
fc = "%{c}"
ml = "%{O20}"
mr = "%{O20}"
sp  = " "
[spacer]
width = 4
sep = ""
[net]
iv =  2
bgc =  "%{B#1a1b26}"
fgc1 =  "%{F#b6c0e9}"
fgc2 =  "%{F#62baad}"
sbg =  "%{B#1a1b26}"
sfg =  "%{F#7aa5f5}"
tx_qstr =  "/sys/class/net/eth1/statistics/tx_bytes"
st_qstr =  "nmcli -f STATE -t device status"
rx_qstr =  "/sys/class/net/eth1/statistics/rx_bytes"
sep =  ""
fmt = fmt.fr 
[volume]
fgc1 =  "%{F#b6c0e9}"
bgc =  "%{B#1a1b26}"
v_get_str =  "pactl get-sink-volume @DEFAULT_SINK@ | cut -d ' ' -f 3"
v_set_str =  "pactl set-sink-volume @DEFAULT_SINK@ "
action  = "pavucontrol"
icon =  ""
max_vol =  65536
step =  1310
iv = 0.5
sep = ""
[weather]
iv =  1800
bgc =  "%{B#1a1b26}"
fgc1 =  "%{F#b6c0e9}"
fgc2 =  "%{F#826bad}"
sbg =  "%{B#1a1b26}"
sfg =  "%{F#1a1b26}"
icon =  ""
w_qstr =  "ansiweather | cut -d ':' -f 2"
action  = "kitty --name 'wetter' --title 'wetter' -o font_size=10 wetter.sh &"
sep =  ""
[window]
fgc1 =  "%{F#ff9e64}"
w_str =  "xdotool getactivewindow getwindowname 2>/dev/null"
fmt = ""
sep = ""
width = 60
iv = 0.5
[date]
bgc =  "%{B#1a1b26}"
fgc1 =  "%{F#7aa5f5}"
fgc2 =  "%{F#b6c0e9}"
sfg =  colors.fgc3
sbg =  "%{B#1a1b26}"
d_fmt =  "date +'%a %d:%m:%Y %H.%M'"
action = "toggle.sh rainlendar2 &"
sep = ""
[load]
iv =  2
bgc =  "%{B#1a1b26}"
fgc1 =  "%{F#b6c0e9}"
fgc2 =  "%{F#29bdd7}"
sbg =  "%{B#1a1b26}"
sfg =  "%{F#1a1b26}"
st_qstr =  "/proc/stat"
sep =  ""
[fan]
bgc =  "%{B#1a1b26}"
fgc1 =  "%{F#b6c0e9}"
fgc2 =  "%{F#7aa2f7}"
sbg =  "%{B#1a1b26}"
sfg =  "%{F#1a1b26}"
iv =  10
cf_qstr =  "/sys/class/hwmon/hwmon1/fan1_input"
sf_qstr =  "/sys/class/hwmon/hwmon1/fan2_input"
sep =  ""
[tmp]
bgc =  "%{B#1a1b26}"
fgc1 =  "%{F#b6c0e9}"
fgc2 =  "%{F#826bad}"
sbg =  "%{B#1a1b26}"
sfg =  "%{F#1a1b26}"
iv =  10
ct_qstr =  "/sys/bus/pci/drivers/k10temp/0000:00:18.3/hwmon/hwmon0/temp1_input"
gt_qstr =  "nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits"
st_qstr =  "/sys/class/hwmon/hwmon1/temp1_input"
sep =  ""
fmt = "" 
[mail]
bgc =  "%{B#1a1b26}"
fgc1 =  "%{F#b6c0e9}"
fgc2 =  "%{F#da5f8b}"
sbg =  "%{B#1a1b26}"
sfg =  "%{F#1a1b26}"
nm_qstr =  "claws-mail --status | cut -d ' ' -f 2"
iv = 5
fmt = ""
sep = ""
[top]
iv = 2
icon = ""
tc_str  = "ps -eo comm,%mem,%cpu --sort=%cpu | tail -n 1 | cut -d ' ' -f 1"
tm_str  = "ps -eo comm,%mem,%cpu --sort=%mem | tail -n 1 | cut -d ' ' -f 1"
[example]
fgc1 =  ""
sep = ""
