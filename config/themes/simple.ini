[settings]
timer =  1
modules = "date weather volume spacer window tmp fan load net mail"
cmd = "lemonbar - p -f \'Cousine for Powerline:pixelsize=14\' -B#ff1a1b26 | /bin/sh"
[colors]
bgc1 =  "%{B#1a1b26}"
bgc2 =  "%{B#414447}"
bgc3 =  "%{B#2e3c43}"
fgc1 =  "%{F#b6c0e9}"
fgc2 =  "%{F#826bad}"
fgc3 =  "%{F#7aa2f7}"
sbg1 =  "%{B#1a1b26}"
sbg2 =  "%{B#414447}"
sbg3 =  "%{B#2e3c43}"
sfg1 =  "%{F#1a1b26}"
sfg2 =  "%{F#414447}"
sfg3 =  "%{F#2e3c43}"
bgstop =  "%{B-}"
connected =  "%{F#99c867}"
unconnect = "%{F#444b6a}"
fgstop =  "%{F-}"
unread =  "%{F#da5f8b}"
[symbols]
net =  "ţş╣"
cpu =  "ţČâ"
fan =  "ţżž"
mail = "ţČť"
mail_new = "ţČŤ"
temp = "ţŹÉ"
vol =  "ţäÁ"
wthr =  "ţä╗"
fidx = 1
[separators]
tar =  "ţéŞ"
tal =  "ţé║"
bar = "|"
[fmt]
fl = "%{l}"
fr = "%{r}"
fc = "%{c}"
ml = "%{O20}"
mr = "%{O20}"
sp  = " "
[spacer]
width = 2
sep = ""
[net]
iv =  2
bgc =  "%{B#1a1b26}"
fgc1 =  "%{F#b6c0e9}"
fgc2 =  colors.fgc1
sbg =  "%{B#1a1b26}"
sfg =  "%{F#7aa5f5}"
tx_qstr =  "/sys/class/net/eth0/statistics/tx_bytes"
st_qstr =  "nmcli -f STATE -t device status"
rx_qstr =  "/sys/class/net/eth0/statistics/rx_bytes"
sep =  ""
fmt = fmt.fr 
icon = "Net:"
[volume]
fgc1 =  "%{F#b6c0e9}"
bgc =  "%{B#1a1b26}"
v_get_str =  "pactl get-sink-volume @DEFAULT_SINK@ | cut -d ' ' -f 3"
v_set_str =  "pactl set-sink-volume @DEFAULT_SINK@ "
action = "insert button cmd"
icon =  "Vol:"
max_vol =  65536
step =  1310
iv = 0.5
sfg = colors.fgc1
sbg = colors.bgc1
sep = separators.bar
[weather]
iv =  3600
bgc =  "%{B#1a1b26}"
fgc1 =  "%{F#b6c0e9}"
fgc2 =  "%{F#826bad}"
sbg =  "%{B#1a1b26}"
sfg =  "%{F#1a1b26}"
icon =  ""
w_qstr =  "ansiweather | cut -d ':' -f 2"
action = "insert button cmd"
sep =  ""
[window]
fgc1 =  colors.fgc1
w_str =  "xdotool getactivewindow getwindowname"
fmt = ""
width = 60
iv = 1
sfg = colors.fgc1
sbg = colors.bgc1
sep = separators.bar
[date]
sfg =  colors.fgc1
sbg =  colors.bgc1
d_fmt =  "date +'%a %d:%m:%Y %H.%M'"
action = "insert button cmd"
sep = separators.bar 
[load]
iv =  2
bgc =  "%{B#1a1b26}"
fgc1 =  "%{F#b6c0e9}"
fgc2 =  colors.fgc1
st_qstr =  "/proc/stat"
sep =  ""
icon = "Load:"
sfg = colors.fgc1
sbg = colors.bgc1
sep = separators.bar
[fan]
bgc =  "%{B#1a1b26}"
fgc1 =  "%{F#b6c0e9}"
fgc2 =  colors.fgc1
sbg =  "%{B#1a1b26}"
sfg =  "%{F#1a1b26}"
iv =  10
cf_qstr =  "/sys/class/hwmon/hwmon1/fan1_input"
sf_qstr =  "/sys/class/hwmon/hwmon1/fan2_input"
sep =  ""
icon = "Fan:"
[tmp]
bgc =  "%{B#1a1b26}"
fgc1 =  "%{F#b6c0e9}"
fgc2 =  colors.fgc1
sbg =  "%{B#1a1b26}"
sfg =  "%{F#1a1b26}"
iv =  10
ct_qstr =  "/sys/bus/pci/drivers/k10temp/0000:00:18.3/hwmon/hwmon0/temp1_input"
gt_qstr =  "nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits"
st_qstr =  "/sys/class/hwmon/hwmon1/temp1_input"
sep =  ""
fmt = "" 
icon = "Tmp:"
[mail]
bgc =  "%{B#1a1b26}"
fgc1 =  "%{F#b6c0e9}"
fgc2 =  "%{F#da5f8b}"
sbg =  "%{B#1a1b26}"
sfg =  "%{F#1a1b26}"
nm_qstr =  "claws-mail --status | cut -d ' ' -f 2"
iv = 5
fmt = ""
sep = ""
icon = "no mail"
new  = "mail"
[example]
fgc1 =  ""
sep = ""
